# =============================================================================
# .github/workflows/bonnie-linuxkit.yml
# Builds, tests, and publishes the bonnie-cicd LinuxKit image on every push.
# =============================================================================
name: bonnie-cicd LinuxKit image

on:
  push:
    branches: [main, release/**]
    tags:     ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:    ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME:  bonnie-cicd
  LINUXKIT_VERSION: v1.2.0

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents:      read
  packages:      write
  id-token:      write    # OIDC for signing
  attestations:  write

jobs:
  # --------------------------------------------------------------------------
  lint:
    name: Lint YAML
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install linuxkit
        run: |
          curl -fsSL \
            https://github.com/linuxkit/linuxkit/releases/download/${{ env.LINUXKIT_VERSION }}/linuxkit-linux-amd64 \
            -o /usr/local/bin/linuxkit
          chmod +x /usr/local/bin/linuxkit

      - name: Validate YAML
        run: bash build.sh lint

  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            format: raw
          - arch: arm64
            runner: ubuntu-24.04-arm
            format: raw

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (for cross-arch image pulls)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to proprietary registry (for bonnie image)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.BONNIE_REGISTRY }}
          username: ${{ secrets.BONNIE_REGISTRY_USER }}
          password: ${{ secrets.BONNIE_REGISTRY_TOKEN }}

      - name: Install linuxkit
        run: |
          ARCH=${{ matrix.arch }}
          curl -fsSL \
            https://github.com/linuxkit/linuxkit/releases/download/${{ env.LINUXKIT_VERSION }}/linuxkit-linux-${ARCH} \
            -o /usr/local/bin/linuxkit
          chmod +x /usr/local/bin/linuxkit

      - name: Compute image tag
        id: meta
        run: |
          TAG=$(git describe --tags --always --dirty)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Cache linuxkit layer store
        uses: actions/cache@v4
        with:
          path: ~/.linuxkit
          key: linuxkit-cache-${{ matrix.arch }}-${{ hashFiles('bonnie.yml') }}
          restore-keys: linuxkit-cache-${{ matrix.arch }}-

      - name: Build LinuxKit image
        env:
          IMAGE_NAME:   ${{ env.IMAGE_NAME }}
          IMAGE_TAG:    ${{ steps.meta.outputs.tag }}-${{ matrix.arch }}
          FORMAT:       ${{ matrix.format }}
          OUTPUT_DIR:   ${{ github.workspace }}/output
          BONNIE_IMAGE: ${{ secrets.BONNIE_REGISTRY }}/bonnie:latest
        run: bash build.sh build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linuxkit-${{ matrix.arch }}-${{ steps.meta.outputs.tag }}
          path: output/
          retention-days: 7

      - name: Generate SBOM attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: output/${{ env.IMAGE_NAME }}*

  # --------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test (amd64)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: linuxkit-amd64-*
          path: output/
          merge-multiple: true

      - name: Install QEMU
        run: sudo apt-get install -y --no-install-recommends qemu-system-x86

      - name: Install linuxkit
        run: |
          curl -fsSL \
            https://github.com/linuxkit/linuxkit/releases/download/${{ env.LINUXKIT_VERSION }}/linuxkit-linux-amd64 \
            -o /usr/local/bin/linuxkit
          chmod +x /usr/local/bin/linuxkit

      - name: Boot smoke test
        run: |
          OUTPUT_DIR=${{ github.workspace }}/output \
          IMAGE_NAME=${{ env.IMAGE_NAME }} \
          bash build.sh smoke

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: output/smoke.log

  # --------------------------------------------------------------------------
  publish-manifest:
    name: Publish multi-arch OCI manifest
    runs-on: ubuntu-24.04
    needs: smoke-test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install linuxkit
        run: |
          curl -fsSL \
            https://github.com/linuxkit/linuxkit/releases/download/${{ env.LINUXKIT_VERSION }}/linuxkit-linux-amd64 \
            -o /usr/local/bin/linuxkit
          chmod +x /usr/local/bin/linuxkit

      - name: Compute tag
        id: tag
        run: echo "tag=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: linuxkit-*-${{ steps.tag.outputs.tag }}
          path: output/
          merge-multiple: true

      - name: Push multi-arch manifest
        env:
          IMAGE_TAG:       ${{ steps.tag.outputs.tag }}
          PUSH_REGISTRY:   ${{ env.REGISTRY }}
        run: bash build.sh push

      - name: Sign image with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
