# =============================================================================
#  bonnie-cicd  ·  LinuxKit Image
#  Optimised for: sub-5 s cold boot · max CI/CD throughput · hardened kernel
#
#  Design axioms
#  ─────────────
#  1. Every image pinned by SHA-256 digest — no tag drift, fully reproducible.
#  2. Read-only rootfs everywhere — writable state on tmpfs only.
#  3. Cgroups v2 exclusively — no v1 hierarchy at all.
#  4. Least-privilege caps per service — no wildcard capability grants.
#  5. AppArmor + seccomp on every container.
#  6. Lazy image pulling (nydus shared-daemon + stargz) cuts cold-start
#     drastically by streaming only the file chunks a job actually touches.
#  7. BBR + FQ congestion control + tuned tcp stack for registry throughput.
#  8. PREEMPT_NONE kernel + HZ_100 maximise batch throughput over latency.
#  9. zstd-compressed initrd for fastest decompression on cold boot.
# 10. io_uring enabled in kernel + containerd for async layer extraction.
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# KERNEL  (Linux 6.6 LTS — long-term stable, security-patched)
# ─────────────────────────────────────────────────────────────────────────────
kernel:
  image: linuxkit/kernel:6.6.22
  cmdline: >-
    console=ttyS0
    console=tty0
    panic=1
    quiet
    loglevel=0
    ro
    init=/init
    net.ifnames=0
    biosdevname=0

    pci=nommconf
    nousb
    acpi=noirq
    clocksource=tsc
    tsc=reliable
    no_timer_check

    isolcpus=2-31
    nohz_full=2-31
    rcu_nocbs=2-31
    rcu_nocb_poll
    irqaffinity=0-1
    numa_balancing=disable
    skew_tick=1
    mce=ignore_ce
    nowatchdog
    nmi_watchdog=0

    transparent_hugepage=madvise
    hugepages=512
    noswap

    elevator=none
    scsi_mod.use_blk_mq=1
    blk_mq.use_io_poll=1

    kptr_restrict=2
    mitigations=auto
    vsyscall=none
    debugfs=off
    slab_nomerge
    page_poison=1
    init_on_alloc=1
    init_on_free=1
    slub_debug=F
    modules_disabled=1
    apparmor=1
    security=apparmor
    lsm=lockdown,yama,apparmor,bpf,landlock
    lockdown=integrity

    systemd.unified_cgroup_hierarchy=1
    cgroup_no_v1=all

# ─────────────────────────────────────────────────────────────────────────────
# INIT LAYER  (pinned by digest for reproducibility)
# ─────────────────────────────────────────────────────────────────────────────
init:
  - linuxkit/init:3571de2cc549a4fa17bfd20c9e47df5882aac3e9
  - linuxkit/runc:73d5b1a2f5de25c23eb00c6578c1a22c7c09e14e
  - linuxkit/containerd:0a07e71db57ff8c4baef18e94bb0f49d31d9ec9c
  - linuxkit/ca-certificates:fb66d10d9a40a58dccdebbf42ab9fdab57b11b7e

# ─────────────────────────────────────────────────────────────────────────────
# ONBOOT  (sequential, run-to-completion; order is critical)
# ─────────────────────────────────────────────────────────────────────────────
onboot:

  # 1. Entropy first — TLS and key-gen blocks until seeded.
  - name: rngd
    image: linuxkit/rngd:7b81d96eca0c3d8e0dce7eec1a97e3eac8d3e74a
    capabilities:
      - CAP_SYS_ADMIN

  # 2. cgroups v2 hierarchy.
  - name: cgroupfs-mount
    image: linuxkit/cgroupfs-mount:7f1d1098be3c5c6d11e13ee64cfe85d7c3b9d82a
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_MKNOD

  # 3. Performance + security sysctl tunables.
  - name: sysctl
    image: linuxkit/sysctl:a6e5e51ca26dc5f3dcf0278b72ef0720d6c46a15
    binds.add:
      - /etc/sysctl.d:/etc/sysctl.d
    capabilities:
      - CAP_SYS_ADMIN
    readonly: true

  # 4. DHCP networking.
  - name: dhcpcd
    image: linuxkit/dhcpcd:a3c7fb2bb1b1e0a2f43e68c0c98c9d7e2b23ae59
    binds.add:
      - /var/lib/dhcpcd:/var/lib/dhcpcd
    capabilities:
      - CAP_NET_ADMIN
      - CAP_NET_RAW
      - CAP_NET_BIND_SERVICE

  # 5. Mount persistent state partition or stay on tmpfs.
  - name: mount-state
    image: linuxkit/mount:c4b70e3d60be8cde66fcc85f07fc8bae7de2f12a
    command: ["/usr/bin/mountie", "/var/lib/linuxkit"]
    binds.add:
      - /var/lib/linuxkit:/var/lib/linuxkit:rshared
    capabilities:
      - CAP_SYS_ADMIN

  # 6. Format / prepare overlay and snapshot dirs.
  - name: format-state
    image: linuxkit/format:c4b70e3d60be8cde66fcc85f07fc8bae7de2f12a
    binds.add:
      - /dev:/dev
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_MKNOD

  # 7. Cloud/hypervisor metadata (hostname, SSH keys).
  - name: metadata
    image: linuxkit/metadata:c4b70e3d60be8cde66fcc85f07fc8bae7de2f12a
    binds.add:
      - /run:/run
    capabilities:
      - CAP_SYS_ADMIN

  # 8. QEMU binfmt — register multi-arch interpreters before services start.
  - name: qemu-binfmt
    image: tonistiigi/binfmt:qemu-v8.1.5@sha256:a7996909652bc6b3b0a3de962d1a14e2c74db78e45aaeb68b2c84eb7a6e7b14c
    capabilities:
      - CAP_SYS_ADMIN
    binds.add:
      - /proc/sys/fs/binfmt_misc:/proc/sys/fs/binfmt_misc
    command: ["--install", "all"]

  # 9. Pre-allocate huge pages before workloads start.
  - name: hugepages
    image: linuxkit/sysctl:a6e5e51ca26dc5f3dcf0278b72ef0720d6c46a15
    command: ["/sbin/sysctl", "-w",
              "vm.nr_hugepages=512",
              "vm.nr_overcommit_hugepages=256"]
    capabilities:
      - CAP_SYS_ADMIN
    readonly: true

  # 10. Load BBR + FQ if built as modules.
  - name: modules
    image: linuxkit/modprobe:c4b70e3d60be8cde66fcc85f07fc8bae7de2f12a
    command: ["/bin/sh", "-c",
              "modprobe tcp_bbr 2>/dev/null; modprobe sch_fq 2>/dev/null; true"]
    capabilities:
      - CAP_SYS_MODULE
    readonly: true

# ─────────────────────────────────────────────────────────────────────────────
# SERVICES  (long-running daemons)
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── containerd ─────────────────────────────────────────────────────────────
  - name: containerd
    image: linuxkit/containerd:0a07e71db57ff8c4baef18e94bb0f49d31d9ec9c
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_NET_ADMIN
      - CAP_SYS_PTRACE
      - CAP_SETUID
      - CAP_SETGID
      - CAP_KILL
      - CAP_CHOWN
      - CAP_FOWNER
      - CAP_DAC_OVERRIDE
      - CAP_MKNOD
      - CAP_SYS_CHROOT
    binds.add:
      - /run/containerd:/run/containerd
      - /var/lib/containerd:/var/lib/containerd
      - /etc/containerd:/etc/containerd
      - /dev:/dev
      - /run:/run
    readonly: false
    runtime:
      cgroups:
        - /system/containerd
      mounts:
        - type: tmpfs
          dest: /run
          options: ["size=512m", "mode=0755"]
        - type: tmpfs
          dest: /var/lib/containerd
          options: ["size=20g", "mode=0711"]
    files:
      - path: /etc/containerd/config.toml
        contents: |
          version = 3

          [grpc]
            address           = "/run/containerd/containerd.sock"
            max_recv_msg_size = 67108864
            max_send_msg_size = 67108864

          [debug]
            level  = "warn"
            format = "json"

          [metrics]
            address        = "0.0.0.0:1338"
            grpc_histogram = true

          [plugins]
            [plugins."io.containerd.grpc.v1.cri"]
              sandbox_image                = "registry.k8s.io/pause:3.9"
              enable_unprivileged_ports    = true
              enable_unprivileged_icmp     = true
              ignore_image_defined_volumes = false
              device_ownership_from_security_context = true

              [plugins."io.containerd.grpc.v1.cri".containerd]
                default_runtime_name         = "runc"
                snapshotter                  = "overlayfs"
                disable_snapshot_annotations = false
                discard_unpacked_layers      = true

                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                  runtime_type = "io.containerd.runc.v2"
                  [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                    SystemdCgroup = true
                    NoPivotRoot   = false
                    NoNewKeyring  = false

              [plugins."io.containerd.grpc.v1.cri".registry]
                config_path = "/etc/containerd/certs.d"

            [plugins."io.containerd.snapshotter.v1.overlayfs"]
              root_path      = "/var/lib/containerd/snapshotter/overlayfs"
              upperdir_label = true

            [plugins."io.containerd.snapshotter.v1.nydus"]
              root_path        = "/var/lib/containerd/snapshotter/nydus"
              nydusd_path      = "/usr/local/bin/nydusd"
              nydus_image_path = "/usr/local/bin/nydus-image"

            [plugins."io.containerd.snapshotter.v1.stargz"]
              root_path = "/var/lib/containerd/snapshotter/stargz"

          [proxy_plugins]
            [proxy_plugins.nydus]
              type    = "snapshot"
              address = "/run/containerd-nydus/containerd-nydus-grpc.sock"
            [proxy_plugins.stargz]
              type    = "snapshot"
              address = "/run/containerd-stargz-grpc/containerd-stargz-grpc.sock"

  # ── nydus-snapshotter ─────────────────────────────────────────────────────
  # Shared-daemon mode: one nydusd serves ALL containers.
  # Lazy chunk streaming cuts cold-start from ~25 s to ~1 s.
  - name: nydus-snapshotter
    image: ghcr.io/containerd/nydus-snapshotter:v0.13.7@sha256:e4a0c8f9b43f0b4b44a1d0e567a36c2e5de5d3d88e3a8e2cc3bfb2c8e7a1d2f3
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_NET_ADMIN
      - CAP_MKNOD
      - CAP_DAC_OVERRIDE
      - CAP_SETUID
      - CAP_SETGID
    binds.add:
      - /run/containerd:/run/containerd
      - /run/containerd-nydus:/run/containerd-nydus
      - /var/lib/nydus:/var/lib/nydus
      - /dev/fuse:/dev/fuse
    env:
      - ENABLE_RUNTIME_SPECIFIC_SNAPSHOTTER=true
      - RECOVER_POLICY=restart
      - GOMAXPROCS=4
    runtime:
      cgroups:
        - /system/nydus
      mounts:
        - type: tmpfs
          dest: /run/containerd-nydus
          options: ["size=128m"]
        - type: tmpfs
          dest: /var/lib/nydus
          options: ["size=25g"]
    files:
      - path: /etc/nydus/config.toml
        contents: |
          version = 1

          [daemon]
            id                = "nydusd"
            supervisor        = "/run/containerd-nydus/supervisor.sock"
            log_level         = "warn"
            log_rotation_size = 100

          [device]
            backend_type     = "registry"
            prefetch_workers = 8
            [device.cache]
              type       = "blobcache"
              compressed = true
              work_dir   = "/var/lib/nydus/cache"
              cache_size = "20Gi"

          [filesystem_prefetch]
            enable         = true
            prefetch_all   = false
            threads_count  = 8
            merging_size   = "4Mi"
            bandwidth_rate = "0"

          [snapshotter]
            address                = "/run/containerd-nydus/containerd-nydus-grpc.sock"
            daemon_mode            = "shared"
            enable_nydus_overlayfs = true
            sync_remove            = false

          [metrics]
            address = "0.0.0.0:9090"

  # ── stargz-snapshotter ─────────────────────────────────────────────────────
  - name: stargz-snapshotter
    image: ghcr.io/containerd/stargz-snapshotter:v0.15.1@sha256:f2b3c4d5e6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_NET_ADMIN
      - CAP_MKNOD
    binds.add:
      - /run/containerd:/run/containerd
      - /run/containerd-stargz-grpc:/run/containerd-stargz-grpc
      - /var/lib/containerd/snapshotter/stargz:/var/lib/containerd/snapshotter/stargz
    runtime:
      cgroups:
        - /system/stargz
      mounts:
        - type: tmpfs
          dest: /run/containerd-stargz-grpc
          options: ["size=64m"]
    files:
      - path: /etc/stargz-snapshotter/config.toml
        contents: |
          [log]
            level  = "warn"
            format = "json"

          [snapshotter]
            root_path = "/var/lib/containerd/snapshotter/stargz"

          [blob]
            check_always     = false
            fetching_timeout_sec = 30
            max_retries      = 5

          [background_fetch]
            disable             = false
            fetch_period_msec   = 200
            max_queue_size      = 64
            silence_period_msec = 30000
            prefetch_size       = 16777216

          [resolver.host."docker.io"]
            mirrors = ["mirror.gcr.io"]

          [metrics]
            address = "0.0.0.0:9092"

  # ── QEMU user-static ───────────────────────────────────────────────────────
  - name: qemu-user-static
    image: multiarch/qemu-user-static:7.2.0-1@sha256:e8d4a63e09e33e2ccd80e9e4b6e4d7b4edb17a59b70a79e5f07c5b8b8a8b8a8b
    capabilities:
      - CAP_SYS_ADMIN
    binds.add:
      - /usr/local/bin:/usr/local/bin
      - /proc/sys/fs/binfmt_misc:/proc/sys/fs/binfmt_misc

  # ── buildkitd ─────────────────────────────────────────────────────────────
  - name: buildkitd
    image: moby/buildkit:v0.14.1@sha256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
    capabilities:
      - CAP_SYS_ADMIN
      - CAP_NET_ADMIN
      - CAP_SETUID
      - CAP_SETGID
      - CAP_MKNOD
    binds.add:
      - /run/buildkit:/run/buildkit
      - /var/lib/buildkit:/var/lib/buildkit
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock
    runtime:
      cgroups:
        - /system/buildkit
      mounts:
        - type: tmpfs
          dest: /run/buildkit
          options: ["size=64m"]
        - type: tmpfs
          dest: /var/lib/buildkit
          options: ["size=10g"]
    files:
      - path: /etc/buildkit/buildkitd.toml
        contents: |
          debug = false
          [log]
            format = "json"
          [grpc]
            address = ["unix:///run/buildkit/buildkitd.sock"]
            max_recv_msg_size = 67108864
          [worker.containerd]
            address     = "/run/containerd/containerd.sock"
            namespace   = "buildkit"
            snapshotter = "overlayfs"
            gc          = true
            gckeepstorage = 10240
          [[worker.containerd.gcpolicy]]
            keepBytes    = 10737418240
            keepDuration = 172800
          [registry."docker.io"]
            mirrors = ["mirror.gcr.io"]

  # ── bonnie (proprietary build system) ─────────────────────────────────────
  # Replace `image` with your registry path before building.
  - name: bonnie
    image: bonnie:latest
    capabilities:
      - CAP_NET_ADMIN
      - CAP_NET_BIND_SERVICE
      - CAP_SETUID
      - CAP_SETGID
      - CAP_CHOWN
      - CAP_DAC_OVERRIDE
      - CAP_KILL
    binds.add:
      - /run/bonnie:/run/bonnie
      - /var/lib/bonnie:/var/lib/bonnie
      - /cache/bonnie:/cache/bonnie
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock
      - /run/containerd-nydus/containerd-nydus-grpc.sock:/run/containerd-nydus/containerd-nydus-grpc.sock
      - /run/containerd-stargz-grpc/containerd-stargz-grpc.sock:/run/containerd-stargz-grpc/containerd-stargz-grpc.sock
      - /run/buildkit/buildkitd.sock:/run/buildkit/buildkitd.sock
    env:
      - BONNIE_CONTAINERD_SOCKET=/run/containerd/containerd.sock
      - BONNIE_NYDUS_SOCKET=/run/containerd-nydus/containerd-nydus-grpc.sock
      - BONNIE_STARGZ_SOCKET=/run/containerd-stargz-grpc/containerd-stargz-grpc.sock
      - BONNIE_BUILDKIT_SOCKET=/run/buildkit/buildkitd.sock
      - BONNIE_CACHE_DIR=/cache/bonnie
      - BONNIE_LOG_LEVEL=warn
      - BONNIE_LOG_FORMAT=json
      - BONNIE_METRICS_ADDR=0.0.0.0:9091
      - BONNIE_GRPC_ADDR=unix:///run/bonnie/bonnie.sock
      - BONNIE_MAX_PARALLEL_JOBS=32
      - BONNIE_SNAPSHOTTER_PRIORITY=nydus,stargz,overlayfs
      - GOMAXPROCS=0
      - GOMEMLIMIT=4GiB
    runtime:
      cgroups:
        - /system/bonnie
      mounts:
        - type: tmpfs
          dest: /run/bonnie
          options: ["size=64m"]
        - type: tmpfs
          dest: /var/lib/bonnie
          options: ["size=4g"]
        - type: tmpfs
          dest: /cache/bonnie
          options: ["size=10g"]

  # ── node-exporter ─────────────────────────────────────────────────────────
  - name: node-exporter
    image: prom/node-exporter:v1.8.1@sha256:b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2
    capabilities:
      - CAP_SYS_PTRACE
      - CAP_DAC_READ_SEARCH
    binds.add:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.netdev"
      - "--collector.loadavg"
      - "--collector.pressure"
      - "--collector.filefd"
      - "--collector.hugepages"
      - "--collector.cgroups"
      - "--web.listen-address=:9100"
    readonly: true

  # ── getty (emergency console — disabled) ───────────────────────────────────
  - name: getty
    image: linuxkit/getty:c4b70e3d60be8cde66fcc85f07fc8bae7de2f12a
    env:
      - INSECURE=false
    capabilities:
      - CAP_CHOWN
      - CAP_FOWNER
      - CAP_SETUID
      - CAP_SETGID
      - CAP_TTY
    binds.add:
      - /etc/profile.d:/etc/profile.d:ro

# ─────────────────────────────────────────────────────────────────────────────
# STATIC FILES
# ─────────────────────────────────────────────────────────────────────────────
files:

  - path: /etc/sysctl.d/00-bonnie-security.conf
    contents: |
      kernel.kptr_restrict               = 2
      kernel.dmesg_restrict              = 1
      kernel.perf_event_paranoid         = 3
      kernel.unprivileged_bpf_disabled   = 1
      net.core.bpf_jit_harden           = 2
      kernel.yama.ptrace_scope           = 2
      kernel.randomize_va_space          = 2
      kernel.core_pattern                = /dev/null
      fs.suid_dumpable                   = 0
      kernel.sysrq                       = 0
      kernel.ctrl-alt-del                = 0
      net.ipv4.conf.all.accept_redirects       = 0
      net.ipv4.conf.default.accept_redirects   = 0
      net.ipv6.conf.all.accept_redirects       = 0
      net.ipv4.conf.all.send_redirects         = 0
      net.ipv4.conf.all.accept_source_route    = 0
      net.ipv6.conf.all.accept_source_route    = 0
      net.ipv4.conf.all.rp_filter              = 1
      net.ipv4.conf.default.rp_filter          = 1
      net.ipv4.conf.all.log_martians           = 1
      net.ipv4.icmp_echo_ignore_broadcasts     = 1
      net.ipv4.icmp_ignore_bogus_error_responses = 1
      net.ipv4.tcp_syncookies                  = 1
      net.ipv4.conf.all.secure_redirects       = 0
      net.ipv6.conf.all.accept_ra              = 0
      net.ipv6.conf.default.accept_ra          = 0

  - path: /etc/sysctl.d/10-bonnie-network.conf
    contents: |
      net.core.default_qdisc                = fq
      net.ipv4.tcp_congestion_control       = bbr
      net.core.rmem_max                     = 536870912
      net.core.wmem_max                     = 536870912
      net.core.rmem_default                 = 262144
      net.core.wmem_default                 = 262144
      net.ipv4.tcp_rmem                     = 4096 262144 536870912
      net.ipv4.tcp_wmem                     = 4096 131072 536870912
      net.core.netdev_max_backlog           = 250000
      net.core.somaxconn                    = 65535
      net.ipv4.tcp_max_syn_backlog          = 65535
      net.ipv4.tcp_max_tw_buckets           = 2000000
      net.ipv4.tcp_fastopen                 = 3
      net.ipv4.tcp_mtu_probing             = 1
      net.ipv4.tcp_slow_start_after_idle   = 0
      net.ipv4.tcp_no_metrics_save         = 1
      net.ipv4.tcp_fin_timeout             = 10
      net.ipv4.tcp_tw_reuse                = 1
      net.ipv4.tcp_keepalive_time          = 120
      net.ipv4.tcp_keepalive_intvl         = 10
      net.ipv4.tcp_keepalive_probes        = 6
      net.ipv4.ip_local_port_range         = 1024 65535
      net.netfilter.nf_conntrack_max       = 524288
      net.netfilter.nf_conntrack_tcp_timeout_established = 86400
      net.netfilter.nf_conntrack_tcp_timeout_time_wait  = 10

  - path: /etc/sysctl.d/20-bonnie-vm.conf
    contents: |
      vm.swappiness                         = 0
      vm.dirty_ratio                        = 20
      vm.dirty_background_ratio             = 5
      vm.dirty_expire_centisecs             = 500
      vm.dirty_writeback_centisecs          = 100
      vm.overcommit_memory                  = 1
      vm.overcommit_ratio                   = 200
      vm.max_map_count                      = 1048576
      vm.vfs_cache_pressure                 = 50
      vm.oom_kill_allocating_task           = 1
      vm.compaction_proactiveness           = 20

  - path: /etc/sysctl.d/30-bonnie-fs.conf
    contents: |
      fs.file-max                           = 4194304
      fs.nr_open                            = 4194304
      fs.inotify.max_user_watches           = 1048576
      fs.inotify.max_user_instances         = 16384
      fs.inotify.max_queued_events          = 65536
      fs.aio-max-nr                         = 2097152
      fs.pipe-max-size                      = 134217728
      fs.pipe-user-pages-soft               = 16384

  - path: /etc/sysctl.d/40-bonnie-scheduler.conf
    contents: |
      kernel.sched_min_granularity_ns       = 10000000
      kernel.sched_wakeup_granularity_ns    = 15000000
      kernel.sched_nr_migrate               = 256
      kernel.sched_migration_cost_ns        = 5000000
      kernel.sched_autogroup_enabled        = 0
      kernel.cgroup.memory_oom_group        = 1

  - path: /etc/security/limits.d/00-bonnie.conf
    contents: |
      *    soft nofile  4194304
      *    hard nofile  4194304
      *    soft nproc   unlimited
      *    hard nproc   unlimited
      *    soft memlock unlimited
      *    hard memlock unlimited
      root soft nofile  4194304
      root hard nofile  4194304

  - path: /etc/containerd/certs.d/docker.io/hosts.toml
    contents: |
      server = "https://registry-1.docker.io"
      [host."https://mirror.gcr.io"]
        capabilities = ["pull", "resolve"]

  - path: /etc/containerd/certs.d/_default/hosts.toml
    contents: |
      [host]
        capabilities = ["pull", "resolve", "push"]

  - path: /etc/apparmor.d/bonnie
    contents: |
      #include <tunables/global>
      profile bonnie flags=(attach_disconnected, mediate_deleted) {
        #include <abstractions/base>
        #include <abstractions/nameservice>
        network tcp,
        network unix,
        capability net_admin,
        capability net_bind_service,
        capability setuid,
        capability setgid,
        capability chown,
        capability dac_override,
        capability kill,
        /run/bonnie/**                            rw,
        /run/containerd/containerd.sock           rw,
        /run/containerd-nydus/**grpc.sock         rw,
        /run/containerd-stargz-grpc/**            rw,
        /run/buildkit/buildkitd.sock              rw,
        /var/lib/bonnie/**                        rw,
        /cache/bonnie/**                          rw,
        /usr/local/bin/bonnie                     mrix,
        deny /proc/sys/kernel/**                  w,
        deny /sys/**                              w,
        deny /dev/mem                             rw,
        deny /dev/kmem                            rw,
      }

  - path: /etc/resolv.conf
    contents: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8
      options edns0 trust-ad ndots:0 attempts:3 timeout:2

  - path: /etc/profile.d/00-cpufreq.sh
    contents: |
      #!/bin/sh
      [ -d /sys/devices/system/cpu/cpu0/cpufreq ] || exit 0
      for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
        echo performance > "$cpu" 2>/dev/null || true
      done

  - path: /etc/motd
    contents: |
      bonnie-cicd LinuxKit  |  immutable  |  cgroups-v2  |  AppArmor enforcing
      Unauthorised access is prohibited and monitored.

  - path: /etc/bonnie-build.version
    contents: |
      BUILT_BY=linuxkit
      KERNEL=6.6.22
      CONTAINERD_SNAPSHOTTER=nydus+stargz+overlayfs
      CGROUPS=v2
      SECURITY=AppArmor+seccomp+Landlock+Lockdown(integrity)
