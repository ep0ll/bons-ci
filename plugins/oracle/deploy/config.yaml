# ─────────────────────────────────────────────────────────────────────────────
# /etc/oci-migrator/config.yaml  (v2 — with warm pool + page server)
# ─────────────────────────────────────────────────────────────────────────────

oci:
  compartment_ocid:     "ocid1.compartment.oc1..aaaaaaaa..."
  availability_domain:  "aBCD:US-ASHBURN-AD-1"
  region:               "us-ashburn-1"
  shape:                "VM.Standard.A1.Flex"
  shape_config:
    ocpus:        4
    memory_in_gbs: 24
  image_ocid:   "ocid1.image.oc1.iad..."
  subnet_ocid:  "ocid1.subnet.oc1.iad..."
  nsg_ocids:
    - "ocid1.networksecuritygroup.oc1.iad..."
  freeform_tags:
    managed-by: "oci-live-migrator"
    workload:   "cicd-build"

migration:
  # IMDS poll intervals.
  monitor_interval:      5s    # normal polling
  fast_monitor_interval: 500ms # after anomaly / preemption warning

  migration_budget:      90s   # must be ≤ 110s

  checkpoint_dir:           /mnt/migration/checkpoints
  shared_volume_device:     /dev/oracleoci/oraclevdb
  shared_volume_mount_path: /mnt/migration
  shared_volume_ocid:       "ocid1.volume.oc1.iad..."

  process_filter:  cgroup
  migrated_cgroup: /cicd/build

  successor_launch_timeout: 90s
  volume_detach_timeout:    25s
  max_retries:              5

  # Control port for inter-instance signalling (start page server, etc.)
  control_port: 7077

criu:
  binary_path:           /usr/sbin/criu
  leave_running:         true
  tcp_established:       true
  external_unix_sockets: true
  shell_job:             true
  file_locks:            true

  # Adaptive pre-dump: up to 5 rounds, stops when dirty_ratio < 4%.
  pre_dump_iterations:          5
  dirty_convergence_threshold:  0.04

  # Brief cgroup freeze before final dump to drain write pipeline.
  pre_freeze_ms: 50

  # Page server: stream memory pages directly TCP to successor.
  # Set to 0 to disable and use shared volume for all data.
  page_server_port: 27182

  # Compress .img files with zstd before writing to shared volume.
  # Reduces I/O by ~40% for typical build processes.
  compress_images: true

  # De-duplicate pages against parent pre-dump images.
  auto_dedup: true

# ── Warm Pool (biggest latency win) ──────────────────────────────────────────
warm_pool:
  enabled:  true
  # Keep 1 warm (STOPPED) instance ready.  Cost: ~$0.003/hour for storage only.
  min_size: 1
  # Replace instances older than 4 hours (keeps the OS image fresh).
  max_age:  4h
  # Maintenance check interval.
  maintenance_interval: 30m
  # Persists warm pool state on the shared volume.
  state_path: /mnt/migration/warm-pool.json

state:
  ledger_path: /mnt/migration/ledger.json
  lock_path:   /mnt/migration/.migrator.lock

telemetry:
  prometheus_addr: ":9090"
  service_name:    "oci-live-migrator"
