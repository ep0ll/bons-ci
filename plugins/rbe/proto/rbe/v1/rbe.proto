syntax = "proto3";

package rbe.v1;

option go_package = "github.com/bons/bons-ci/plugins/rbe/gen/proto/rbe/v1;rbev1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/any.proto";

// ─────────────────────────────────────────────────────────────────────────────
// Common types
// ─────────────────────────────────────────────────────────────────────────────

message Platform {
  string os          = 1;
  string arch        = 2;
  string variant     = 3;
  map<string, string> properties = 4;
}

message FileRef {
  string path       = 1;
  string digest     = 2; // sha256:hex or blake3:hex
  int64  size       = 3;
  uint32 mode       = 4;
  bool   is_dir     = 5;
  bool   is_symlink = 6;
  string link_target = 7;
  google.protobuf.Timestamp modified_at = 8;
}

message VertexInput {
  string vertex_id  = 1;
  int32  output_idx = 2;
  // Files from this dependency vertex that this vertex reads
  repeated FileRef files = 3;
}

message VertexOutput {
  int32  index     = 1;
  string media_type = 2; // e.g. "application/vnd.oci.image.layer.v1.tar+gzip"
  string digest    = 3;
  int64  size      = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// DAG service
// ─────────────────────────────────────────────────────────────────────────────

service DAGService {
  rpc CreateDAG(CreateDAGRequest) returns (CreateDAGResponse);
  rpc GetDAG(GetDAGRequest) returns (GetDAGResponse);
  rpc ListDAGs(ListDAGsRequest) returns (ListDAGsResponse);
  rpc DeleteDAG(DeleteDAGRequest) returns (DeleteDAGResponse);
  rpc UpdateDAGStatus(UpdateDAGStatusRequest) returns (UpdateDAGStatusResponse);

  rpc AddVertex(AddVertexRequest) returns (AddVertexResponse);
  rpc GetVertex(GetVertexRequest) returns (GetVertexResponse);
  rpc ListVertices(ListVerticesRequest) returns (ListVerticesResponse);
  rpc UpdateVertexStatus(UpdateVertexStatusRequest) returns (UpdateVertexStatusResponse);
  rpc GetVertexDependencyTree(GetVertexDependencyTreeRequest) returns (GetVertexDependencyTreeResponse);
}

enum DAGStatus {
  DAG_STATUS_UNSPECIFIED = 0;
  DAG_STATUS_PENDING     = 1;
  DAG_STATUS_RUNNING     = 2;
  DAG_STATUS_SUCCEEDED   = 3;
  DAG_STATUS_FAILED      = 4;
  DAG_STATUS_CANCELLED   = 5;
}

enum VertexStatus {
  VERTEX_STATUS_UNSPECIFIED = 0;
  VERTEX_STATUS_PENDING     = 1;
  VERTEX_STATUS_RUNNING     = 2;
  VERTEX_STATUS_SUCCEEDED   = 3;
  VERTEX_STATUS_FAILED      = 4;
  VERTEX_STATUS_CANCELLED   = 5;
  VERTEX_STATUS_CACHED      = 6; // completed from cache
  VERTEX_STATUS_SKIPPED     = 7;
}

message DAG {
  string id          = 1;
  string build_id    = 2;
  string name        = 3;
  DAGStatus status   = 4;
  repeated string root_vertex_ids = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp completed_at = 8;
  map<string, string> labels = 9;
  string description = 10;
  Platform platform  = 11;
  string created_by  = 12;
}

message Vertex {
  string id          = 1;
  string dag_id      = 2;
  string name        = 3;
  string op_type     = 4;  // "exec", "copy", "merge", "diff", "context", etc.
  bytes  op_payload  = 5;  // op-specific payload (JSON/proto serialized)

  repeated VertexInput  inputs  = 6;
  repeated VertexOutput outputs = 7;

  // Files this vertex reads from its isolated filesystem
  repeated FileRef input_files = 8;
  // Files this vertex produces
  repeated FileRef output_files = 9;

  VertexStatus status  = 10;
  string cache_key     = 11; // content-addressed
  bool   cache_hit     = 12;
  string error         = 13;
  string error_details = 14;

  Platform platform    = 15;
  map<string, string> labels = 16;
  map<string, string> env    = 17;

  google.protobuf.Timestamp created_at    = 18;
  google.protobuf.Timestamp started_at    = 19;
  google.protobuf.Timestamp completed_at  = 20;

  // Resource usage
  ResourceUsage resource_usage = 21;

  // Mount definitions (BuildKit-style)
  repeated MountSpec mounts = 22;
}

message ResourceUsage {
  int64  cpu_nanos       = 1;
  int64  memory_bytes    = 2;
  int64  network_rx_bytes = 3;
  int64  network_tx_bytes = 4;
  int64  io_read_bytes   = 5;
  int64  io_write_bytes  = 6;
  google.protobuf.Duration wall_time = 7;
}

message MountSpec {
  string type     = 1; // "cache", "bind", "secret", "tmpfs", "ssh"
  string target   = 2;
  string source   = 3;
  string cache_id = 4;
  string cache_sharing = 5; // "shared", "private", "locked"
  bool   readonly = 6;
  Platform platform = 7;
  map<string, string> options = 8;
}

message CreateDAGRequest {
  string build_id  = 1;
  string name      = 2;
  map<string, string> labels = 3;
  string description = 4;
  Platform platform  = 5;
}

message CreateDAGResponse {
  DAG dag = 1;
}

message GetDAGRequest {
  string id = 1;
}

message GetDAGResponse {
  DAG dag = 1;
}

message ListDAGsRequest {
  string build_id    = 1;
  string page_token  = 2;
  int32  page_size   = 3;
  map<string, string> label_selector = 4;
  DAGStatus status_filter = 5;
}

message ListDAGsResponse {
  repeated DAG dags      = 1;
  string next_page_token = 2;
  int64  total_count     = 3;
}

message DeleteDAGRequest {
  string id = 1;
}

message DeleteDAGResponse {}

message UpdateDAGStatusRequest {
  string id          = 1;
  DAGStatus status   = 2;
  string error       = 3;
}

message UpdateDAGStatusResponse {
  DAG dag = 1;
}

message AddVertexRequest {
  Vertex vertex = 1;
}

message AddVertexResponse {
  Vertex vertex = 1;
}

message GetVertexRequest {
  string id     = 1;
  string dag_id = 2;
}

message GetVertexResponse {
  Vertex vertex = 1;
}

message ListVerticesRequest {
  string dag_id     = 1;
  string page_token = 2;
  int32  page_size  = 3;
  VertexStatus status_filter = 4;
}

message ListVerticesResponse {
  repeated Vertex vertices   = 1;
  string next_page_token     = 2;
  int64  total_count         = 3;
}

message UpdateVertexStatusRequest {
  string id            = 1;
  string dag_id        = 2;
  VertexStatus status  = 3;
  string error         = 4;
  string error_details = 5;
  repeated FileRef output_files = 6;
  ResourceUsage resource_usage  = 7;
}

message UpdateVertexStatusResponse {
  Vertex vertex = 1;
}

message GetVertexDependencyTreeRequest {
  string vertex_id = 1;
  string dag_id    = 2;
  int32  max_depth = 3; // 0 = unlimited
}

message DependencyNode {
  Vertex vertex = 1;
  repeated DependencyNode deps = 2;
  // Files this vertex provides to its dependents
  repeated FileRef provided_files = 3;
}

message GetVertexDependencyTreeResponse {
  DependencyNode root = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Cache service
// ─────────────────────────────────────────────────────────────────────────────

service CacheService {
  rpc CheckCache(CheckCacheRequest) returns (CheckCacheResponse);
  rpc StoreCache(StoreCacheRequest) returns (StoreCacheResponse);
  rpc GetCacheEntry(GetCacheEntryRequest) returns (GetCacheEntryResponse);
  rpc ListCacheEntries(ListCacheEntriesRequest) returns (ListCacheEntriesResponse);
  rpc DeleteCacheEntry(DeleteCacheEntryRequest) returns (DeleteCacheEntryResponse);
  rpc ComputeCacheKey(ComputeCacheKeyRequest) returns (ComputeCacheKeyResponse);
  rpc InvalidateCache(InvalidateCacheRequest) returns (InvalidateCacheResponse);
}

message CacheKey {
  // Digest of op definition + env + platform
  string op_digest      = 1;
  // Digests of all input file contents
  repeated string input_file_digests = 2;
  // Cache keys of all dependency vertices
  repeated string dep_cache_keys = 3;
  // Platform selector
  Platform platform     = 4;
  // Additional cache-busting selector
  string selector       = 5;
}

message CacheEntry {
  string id            = 1;
  string cache_key     = 2; // sha256 of CacheKey
  string vertex_id     = 3;
  string dag_id        = 4;

  // Content-addressed references to output blobs
  repeated string output_digests = 5;
  // Output file listing
  repeated FileRef output_files  = 6;

  CacheEntryKind kind  = 7;
  Platform platform    = 8;

  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp expires_at = 10;
  google.protobuf.Timestamp last_used_at = 11;
  int64  hit_count     = 12;

  map<string, string> metadata = 13;

  // Inlined result for tiny outputs (< 64KiB)
  bytes inline_data = 14;
}

enum CacheEntryKind {
  CACHE_ENTRY_KIND_UNSPECIFIED = 0;
  CACHE_ENTRY_KIND_BLOB        = 1;
  CACHE_ENTRY_KIND_INLINE      = 2;
  CACHE_ENTRY_KIND_MANIFEST    = 3; // OCI manifest reference
}

message CheckCacheRequest {
  CacheKey cache_key   = 1;
  string   vertex_id   = 2;
  bool     with_files  = 3;
}

message CheckCacheResponse {
  bool   hit    = 1;
  CacheEntry entry = 2;
}

message StoreCacheRequest {
  CacheKey cache_key          = 1;
  string   vertex_id          = 2;
  string   dag_id             = 3;
  repeated string output_digests = 4;
  repeated FileRef output_files  = 5;
  google.protobuf.Duration ttl   = 6;
  bytes    inline_data           = 7;
  CacheEntryKind kind            = 8;
  Platform platform              = 9;
  map<string, string> metadata   = 10;
}

message StoreCacheResponse {
  CacheEntry entry = 1;
}

message GetCacheEntryRequest {
  string cache_key = 1;
}

message GetCacheEntryResponse {
  CacheEntry entry = 1;
}

message ListCacheEntriesRequest {
  string vertex_id   = 1;
  string dag_id      = 2;
  string page_token  = 3;
  int32  page_size   = 4;
  Platform platform  = 5;
}

message ListCacheEntriesResponse {
  repeated CacheEntry entries = 1;
  string next_page_token      = 2;
  int64  total_count          = 3;
}

message DeleteCacheEntryRequest {
  string cache_key = 1;
}

message DeleteCacheEntryResponse {}

message ComputeCacheKeyRequest {
  string op_digest             = 1;
  repeated string input_files  = 2; // paths to hash
  repeated string dep_vertex_ids = 3;
  Platform platform            = 4;
  string selector              = 5;
}

message ComputeCacheKeyResponse {
  string cache_key = 1;
  CacheKey key     = 2;
}

message InvalidateCacheRequest {
  // Invalidate all entries for a vertex
  string vertex_id      = 1;
  // Or all entries for a DAG
  string dag_id         = 2;
  // Or a specific key
  string cache_key      = 3;
  // Cascade: also invalidate dependents
  bool   cascade        = 4;
}

message InvalidateCacheResponse {
  int64 invalidated_count = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Log service
// ─────────────────────────────────────────────────────────────────────────────

service LogService {
  // Create a log stream for a vertex FD
  rpc CreateLogStream(CreateLogStreamRequest) returns (CreateLogStreamResponse);

  // Upload log chunks (client streaming)
  rpc UploadLogs(stream UploadLogsRequest) returns (UploadLogsResponse);

  // Stream logs in real-time (server streaming)
  rpc TailLogs(TailLogsRequest) returns (stream LogChunk);

  // Get buffered log data
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse);

  // List all log streams for a vertex
  rpc ListLogStreams(ListLogStreamsRequest) returns (ListLogStreamsResponse);

  // Close a log stream (mark complete)
  rpc CloseLogStream(CloseLogStreamRequest) returns (CloseLogStreamResponse);

  // Get aggregated log for a vertex (all FDs merged, sorted by time)
  rpc GetVertexLogs(GetVertexLogsRequest) returns (GetVertexLogsResponse);
}

enum FDType {
  FD_TYPE_UNSPECIFIED = 0;
  FD_STDIN            = 1;  // fd 0
  FD_STDOUT           = 2;  // fd 1
  FD_STDERR           = 3;  // fd 2
  FD_PROGRESS         = 4;  // buildkit progress messages
  FD_OTHER            = 5;
}

message LogStream {
  string id        = 1;
  string vertex_id = 2;
  string dag_id    = 3;
  FDType fd_type   = 4;
  int32  fd_num    = 5; // actual FD number (0, 1, 2, ...)
  bool   closed    = 6;
  int64  total_bytes = 7;
  int64  chunk_count = 8;
  google.protobuf.Timestamp created_at  = 9;
  google.protobuf.Timestamp closed_at   = 10;
  map<string, string> metadata = 11;
}

message LogChunk {
  string stream_id = 1;
  int64  sequence  = 2;
  bytes  data      = 3;
  google.protobuf.Timestamp timestamp = 4;
  FDType fd_type   = 5;
  int32  fd_num    = 6;
}

message CreateLogStreamRequest {
  string vertex_id = 1;
  string dag_id    = 2;
  FDType fd_type   = 3;
  int32  fd_num    = 4;
  map<string, string> metadata = 5;
}

message CreateLogStreamResponse {
  LogStream stream = 1;
}

message UploadLogsRequest {
  string stream_id = 1;
  int64  sequence  = 2;
  bytes  data      = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message UploadLogsResponse {
  int64 chunks_received = 1;
  int64 bytes_received  = 2;
}

message TailLogsRequest {
  string stream_id     = 1;
  int64  from_sequence = 2; // 0 = from beginning
  bool   follow        = 3; // true = keep streaming until closed
}

message GetLogsRequest {
  string stream_id     = 1;
  int64  from_sequence = 2;
  int64  to_sequence   = 3; // 0 = to end
  int32  max_chunks    = 4;
}

message GetLogsResponse {
  repeated LogChunk chunks = 1;
  bool   has_more          = 2;
  int64  next_sequence     = 3;
}

message ListLogStreamsRequest {
  string vertex_id = 1;
  string dag_id    = 2;
}

message ListLogStreamsResponse {
  repeated LogStream streams = 1;
}

message CloseLogStreamRequest {
  string stream_id = 1;
}

message CloseLogStreamResponse {
  LogStream stream = 1;
}

message GetVertexLogsRequest {
  string vertex_id     = 1;
  string dag_id        = 2;
  repeated FDType fds  = 3; // empty = all FDs
  bool   interleaved   = 4; // merge all FDs sorted by timestamp
}

message GetVertexLogsResponse {
  repeated LogChunk chunks     = 1;
  repeated LogStream streams   = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Mount cache service  (BuildKit-style --mount=type=cache)
// ─────────────────────────────────────────────────────────────────────────────

service MountCacheService {
  rpc CreateMountCache(CreateMountCacheRequest) returns (CreateMountCacheResponse);
  rpc GetMountCache(GetMountCacheRequest) returns (GetMountCacheResponse);
  rpc ListMountCaches(ListMountCachesRequest) returns (ListMountCachesResponse);
  rpc DeleteMountCache(DeleteMountCacheRequest) returns (DeleteMountCacheResponse);
  rpc LockMountCache(LockMountCacheRequest) returns (LockMountCacheResponse);
  rpc UnlockMountCache(UnlockMountCacheRequest) returns (UnlockMountCacheResponse);
  rpc UploadMountCacheData(stream UploadMountCacheDataRequest) returns (UploadMountCacheDataResponse);
  rpc DownloadMountCacheData(DownloadMountCacheDataRequest) returns (stream DownloadMountCacheDataResponse);
  rpc PruneMountCaches(PruneMountCachesRequest) returns (PruneMountCachesResponse);
}

enum CacheSharingMode {
  CACHE_SHARING_UNSPECIFIED = 0;
  CACHE_SHARING_SHARED      = 1; // concurrent reads/writes
  CACHE_SHARING_PRIVATE     = 2; // exclusive copy-on-write
  CACHE_SHARING_LOCKED      = 3; // exclusive lock
}

message MountCache {
  string id           = 1;
  string user_key     = 2; // user-defined identifier
  string scope        = 3; // isolation scope (e.g. project, user, global)
  bool   platform_specific = 4;
  Platform platform   = 5; // only set if platform_specific=true

  CacheSharingMode sharing = 6;

  string blob_digest  = 7; // reference into blob store
  int64  size_bytes   = 8;
  bool   locked       = 9;
  string lock_owner   = 10; // vertex_id holding the lock
  google.protobuf.Timestamp lock_expires_at = 11;

  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  google.protobuf.Timestamp accessed_at = 14;

  map<string, string> labels = 15;
}

message CreateMountCacheRequest {
  string user_key          = 1;
  string scope             = 2;
  bool   platform_specific = 3;
  Platform platform        = 4;
  CacheSharingMode sharing = 5;
  map<string, string> labels = 6;
}

message CreateMountCacheResponse {
  MountCache cache = 1;
}

message GetMountCacheRequest {
  string id       = 1;
  // OR look up by key + scope + platform
  string user_key = 2;
  string scope    = 3;
  Platform platform = 4;
}

message GetMountCacheResponse {
  MountCache cache = 1;
}

message ListMountCachesRequest {
  string scope      = 1;
  Platform platform = 2;
  string page_token = 3;
  int32  page_size  = 4;
}

message ListMountCachesResponse {
  repeated MountCache caches = 1;
  string next_page_token     = 2;
}

message DeleteMountCacheRequest {
  string id = 1;
}

message DeleteMountCacheResponse {}

message LockMountCacheRequest {
  string id         = 1;
  string owner      = 2; // vertex_id
  google.protobuf.Duration ttl = 3;
}

message LockMountCacheResponse {
  bool   acquired   = 1;
  MountCache cache  = 2;
}

message UnlockMountCacheRequest {
  string id    = 1;
  string owner = 2;
}

message UnlockMountCacheResponse {}

message UploadMountCacheDataRequest {
  string cache_id = 1;
  bytes  data     = 2;
  int64  offset   = 3;
  bool   final    = 4;
}

message UploadMountCacheDataResponse {
  string blob_digest = 1;
  int64  size_bytes  = 2;
}

message DownloadMountCacheDataRequest {
  string cache_id = 1;
  int64  offset   = 2;
  int64  length   = 3;
}

message DownloadMountCacheDataResponse {
  bytes data   = 1;
  int64 offset = 2;
  bool  final  = 3;
}

message PruneMountCachesRequest {
  string scope       = 1;
  bool   all         = 2;
  google.protobuf.Duration older_than = 3;
  int64  keep_bytes  = 4;
}

message PruneMountCachesResponse {
  int64 pruned_count = 1;
  int64 freed_bytes  = 2;
}
