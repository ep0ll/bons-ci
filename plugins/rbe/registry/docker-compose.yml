version: "3.9"

# ── AccelRegistry local development stack ────────────────────────────────────
# Services:
#   accelregistry  — The registry itself (OCI + Accel API)
#   prometheus     — Scrapes metrics from :9090
#   grafana        — Dashboards (login: admin/admin)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f accelregistry
#   docker compose down -v

services:
  # ── AccelRegistry ──────────────────────────────────────────────────────────
  accelregistry:
    build:
      context: .
      args:
        VERSION: dev
        COMMIT: local
    image: accelregistry:dev
    container_name: accelregistry
    ports:
      - "5000:5000"   # OCI + Accel API
      - "9090:9090"   # Prometheus metrics
    environment:
      ACCELREG_ADDR: ":5000"
      ACCELREG_METRICS_ADDR: ":9090"
      ACCELREG_LOG_LEVEL: "debug"
      ACCELREG_EXPECTED_SOURCES: "100000"
      ACCELREG_READ_TIMEOUT: "30s"
      ACCELREG_WRITE_TIMEOUT: "60s"
      ACCELREG_IDLE_TIMEOUT: "120s"
    volumes:
      - accelregistry-data:/data/snapshots
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - accelregistry-net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: accelregistry-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      accelregistry:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - accelregistry-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: accelregistry-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - accelregistry-net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  accelregistry-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  accelregistry-net:
    driver: bridge
