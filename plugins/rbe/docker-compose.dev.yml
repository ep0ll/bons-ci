version: "3.9"

services:
  # MinIO (S3-compatible)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rbeadmin
      MINIO_ROOT_PASSWORD: rbepassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket init
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 rbeadmin rbepassword;
      mc mb --ignore-existing local/rbe-blobs;
      mc anonymous set public local/rbe-blobs;
      echo '✓ MinIO bucket ready';
      "

  # etcd
  etcd:
    image: bitnami/etcd:latest
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RBE daemon
  rbed:
    build: .
    depends_on:
      minio:
        condition: service_healthy
      etcd:
        condition: service_healthy
    ports:
      - "8080:8080"   # HTTP / OCI registry
      - "9090:9090"   # gRPC
      - "8081:8081"   # Prometheus metrics
    environment:
      RBE_STORAGE_BACKEND: s3
      RBE_STORAGE_S3_ENDPOINT: http://minio:9000
      RBE_STORAGE_S3_BUCKET: rbe-blobs
      RBE_STORAGE_S3_ACCESS_KEY_ID: rbeadmin
      RBE_STORAGE_S3_SECRET_ACCESS_KEY: rbepassword
      RBE_STORAGE_S3_FORCE_PATH_STYLE: "true"
      RBE_METADATA_BACKEND: etcd
      RBE_METADATA_ETCD_ENDPOINTS: "etcd:2379"
      RBE_SERVER_HTTP_ADDR: ":8080"
      RBE_SERVER_GRPC_ADDR: ":9090"
      RBE_OBSERVABILITY_PROMETHEUS_ADDR: ":8081"
      RBE_OBSERVABILITY_LOG_LEVEL: debug

volumes:
  minio-data:
  etcd-data:
