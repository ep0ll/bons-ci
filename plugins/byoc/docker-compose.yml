version: "3.9"

services:

  # ── MySQL — control-plane state ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: byoc
      MYSQL_USER: byoc
      MYSQL_PASSWORD: byoc
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "byoc", "-pbyoc"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Mock GitHub server — for local webhook testing ───────────────────────────
  mock-github:
    image: mockserver/mockserver:5.15.0
    ports:
      - "9000:1080"
    environment:
      MOCKSERVER_LOG_LEVEL: WARN
      MOCKSERVER_SERVER_PORT: "1080"

  # ── Control plane ─────────────────────────────────────────────────────────────
  byoc-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      BYOC_DB_DSN: "byoc:byoc@tcp(mysql:3306)/byoc?parseTime=true"
      BYOC_LOG_PRETTY: "true"
      BYOC_LOG_LEVEL: "debug"
      BYOC_HTTP_PORT: "8080"
      BYOC_DEBUG: "true"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus — local metrics scraping ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - byoc-server

volumes:
  mysql_data:
