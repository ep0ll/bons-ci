name               = "s3-proxy"
main               = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]
workers_dev        = false

[[kv_namespaces]]
binding    = "TENANT_KV"
id         = "REPLACE_WITH_TENANT_KV_ID"
preview_id = "REPLACE_WITH_TENANT_KV_PREVIEW_ID"

[[kv_namespaces]]
binding    = "UPLOAD_KV"
id         = "REPLACE_WITH_UPLOAD_KV_ID"
preview_id = "REPLACE_WITH_UPLOAD_KV_PREVIEW_ID"

# Serve both path-style and virtual-hosted style
[[routes]]
pattern   = "s3.example.com/*"
zone_name = "example.com"

[[routes]]
pattern   = "*.s3.example.com/*"
zone_name = "example.com"

[vars]
PROXY_DOMAIN          = "s3.example.com"
LOG_LEVEL             = "info"
PRESIGN_EXPIRY_S      = "900"
MAX_PRESIGN_EXPIRY_S  = "604800"   # 7 days — S3 maximum
UPLOAD_TTL_S          = "604800"   # 7 days — mirrors S3 MPU lifetime
MAX_KEYS_LIMIT        = "1000"

# Secrets — set via: wrangler secret put <NAME>
# MASTER_ENC_KEY  — 64 hex chars (32-byte AES-256 key)

[env.dev]
name        = "s3-proxy-dev"
workers_dev = true
[env.dev.vars]
PROXY_DOMAIN          = "localhost"
LOG_LEVEL             = "debug"
PRESIGN_EXPIRY_S      = "300"

[env.staging]
name        = "s3-proxy-staging"
workers_dev = false
[env.staging.vars]
PROXY_DOMAIN     = "s3-staging.example.com"
LOG_LEVEL        = "debug"
PRESIGN_EXPIRY_S = "300"
