# ── signing-service Kubernetes deployment ────────────────────────────────────
# Production-hardened: non-root, read-only root FS, dropped capabilities,
# resource limits, and PodDisruptionBudget for zero-downtime rolling updates.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signing-service
  namespace: signing
  labels:
    app.kubernetes.io/name: signing-service
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: signing
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: signing-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # zero-downtime: always keep all replicas healthy before replacing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signing-service
      annotations:
        # Prometheus scraping — works with prometheus-operator ServiceMonitor too.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: signing-service-sa
      automountServiceAccountToken: true  # required for GKE Workload Identity OIDC

      # Affinity: spread replicas across zones for HA.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: signing-service

      containers:
        - name: signing-service
          image: "registry.example.com/signing-service:1.0.0"  # pin digest in production
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: CONFIG_PATH
              value: /etc/signing-service/config.yaml
            - name: SIGNING_BACKEND
              value: keyless
            - name: FULCIO_URL
              value: https://fulcio.sigstore.dev
            - name: REKOR_URL
              value: https://rekor.sigstore.dev
            - name: OIDC_ISSUER
              value: https://accounts.google.com
            # Never inject credentials as env vars — use projected volumes or
            # Workload Identity. SIGNING_KEY_PATH is only for static_key backend.
            # - name: SIGNING_KEY_PATH
            #   value: /var/run/secrets/signing/key.pem

          volumeMounts:
            - name: config
              mountPath: /etc/signing-service
              readOnly: true
            # Uncomment for static_key backend:
            # - name: signing-key
            #   mountPath: /var/run/secrets/signing
            #   readOnly: true

          # ── Probes ────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2

          startupProbe:
            httpGet:
              path: /livez
              port: http
            failureThreshold: 30
            periodSeconds: 2

          # ── Resources ─────────────────────────────────────────────────────
          # Tune based on load testing. Signing is CPU-light; memory bound by
          # in-flight channel buffers (buffer_size × avg_event_size).
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ── Security context ──────────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532   # matches distroless:nonroot
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: config
          configMap:
            name: signing-service-config
        # Uncomment for static_key backend:
        # - name: signing-key
        #   secret:
        #     secretName: signing-service-key
        #     defaultMode: 0400  # owner read-only

      # ── Graceful shutdown ─────────────────────────────────────────────────
      # terminationGracePeriodSeconds must be ≥ server.shutdown_timeout in config.
      terminationGracePeriodSeconds: 60

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: signing-service
  namespace: signing
spec:
  selector:
    app.kubernetes.io/name: signing-service
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics

---
# ── PodDisruptionBudget ───────────────────────────────────────────────────────
# Ensures at least 2 replicas stay available during cluster maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: signing-service-pdb
  namespace: signing
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: signing-service

---
# ── ServiceAccount (for GKE Workload Identity) ────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: signing-service-sa
  namespace: signing
  annotations:
    # GKE Workload Identity: binds this KSA to a GSA for keyless signing.
    iam.gke.io/gcp-service-account: signing-service@PROJECT_ID.iam.gserviceaccount.com
